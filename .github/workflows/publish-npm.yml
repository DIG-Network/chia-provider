name: publish-npm

# Publish @dignetwork/chia-provider to npmjs. Auth uses npm Trusted Publishing (OIDC) — the
# workflow requests a short-lived GitHub Actions OIDC token (permissions.id-token: write) which
# npm exchanges for a provenance-attested publish; there is no NPM_TOKEN secret. Runs when a
# GitHub Release is published (tag-driven), or on manual dispatch. The version published is
# whatever is in package.json on the released commit — bump it before tagging.
#
# Does NOT re-run the test suite: the PR release gates (ci.yml) already ran tests + the coverage
# floor against this exact merged tree before it was allowed to merge. Re-running tests here is
# redundant and adds a pure flake-exposure surface at deploy time with no additional safety (#489,
# following the pattern that blocked a release in #488). This job builds/packages/publishes only.
on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Trusted publishing requires npm CLI >= 11.5.1; Node 22 bundles npm 10.
      - name: upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - name: publish to npmjs
        run: npm publish --access public
