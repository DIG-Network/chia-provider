name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test + coverage (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # No runtime deps; c8 (coverage) is the only devDependency.
      - run: npm install --no-audit --no-fund
      - name: Unit tests
        run: npm test
      # Coverage gate: ≥80% lines/functions (CLAUDE.md §2.3). Fails the build below the floor.
      - name: Coverage (gated ≥80%)
        run: npm run coverage
